<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc viewer — NREL Lab website</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root{
      --navy:#1a2332; --navy-d:#162030; --gold:#82603a; --cream:#faf4ec;
      --ring:#eadfcb; --paper:#fff; --ink:#1a2332; --mid:#565f70; --dim:#8b91a0;
      --font:'Pretendard Variable',Pretendard,system-ui,sans-serif;
      --mono:ui-monospace,'Cascadia Code',Consolas,monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--font);line-height:1.7}
    .rule{height:3px;background:linear-gradient(90deg,var(--gold),#a17c4e,var(--gold))}
    .bar{position:sticky;top:0;background:rgba(250,244,236,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--ring);padding:.7rem 1.5rem;display:flex;gap:1rem;align-items:center;font-size:.9rem}
    .bar a{color:var(--gold);font-weight:600;text-decoration:none}
    .bar a:hover{text-decoration:underline}
    .bar .file{font-family:var(--mono);color:var(--dim);font-size:.8rem;margin-left:auto}
    main{max-width:820px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
    #doc h1{font-size:2rem;font-weight:800;letter-spacing:-.02em;margin:.2rem 0 1rem;color:var(--navy)}
    #doc h2{font-size:1.4rem;font-weight:800;margin:2rem 0 .8rem;color:var(--navy);padding-bottom:.3rem;border-bottom:2px solid var(--ring)}
    #doc h3{font-size:1.1rem;font-weight:700;margin:1.4rem 0 .5rem;color:var(--navy)}
    #doc p,#doc li{color:var(--ink)}
    #doc a{color:var(--gold);font-weight:600}
    #doc code{font-family:var(--mono);font-size:.88em;background:rgba(130,96,58,.1);padding:.1rem .35rem;border-radius:4px}
    #doc pre{background:var(--navy);color:var(--cream);padding:1rem 1.2rem;border-radius:10px;overflow-x:auto;font-family:var(--mono);font-size:.85rem;line-height:1.55}
    #doc pre code{background:none;padding:0;color:inherit}
    #doc ul,#doc ol{padding-left:1.4rem}
    #doc li{margin:.3rem 0}
    #doc blockquote{border-left:3px solid var(--gold);margin:1rem 0;padding:.3rem 0 .3rem 1rem;color:var(--mid);background:rgba(130,96,58,.05)}
    #doc table{border-collapse:collapse;width:100%;margin:1rem 0;font-size:.92rem;display:block;overflow-x:auto}
    #doc th,#doc td{border:1px solid var(--ring);padding:.5rem .7rem;text-align:left;vertical-align:top}
    #doc th{background:rgba(130,96,58,.08);font-family:var(--mono);font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:var(--navy)}
    #doc hr{border:none;border-top:1px solid var(--ring);margin:2rem 0}
    .err{background:#fff;border:1px solid var(--ring);border-top:3px solid var(--gold);border-radius:12px;padding:1.5rem}
    .err code{font-family:var(--mono)}
  </style>
</head>
<body>
  <div class="rule"></div>
  <div class="bar">
    <a href="index.html">← Docs hub</a>
    <a href="../index.html">Live site</a>
    <span class="file" id="filelabel"></span>
  </div>
  <main><div id="doc">Loading…</div></main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var p = params.get('p') || 'index.md';
      // allow only relative .md paths inside the folder
      if (!/^[\w./-]+\.md$/.test(p) || p.indexOf('//') !== -1) {
        showError('Invalid document path.');
        return;
      }
      document.getElementById('filelabel').textContent = p;
      document.title = p + ' — NREL Lab docs';
      fetch(p, { cache: 'no-cache' })
        .then(function (r) { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.text(); })
        .then(function (md) {
          if (window.marked) {
            marked.setOptions({ gfm: true, breaks: false });
            document.getElementById('doc').innerHTML = marked.parse(md);
          } else {
            document.getElementById('doc').innerHTML = '<pre></pre>';
            document.querySelector('#doc pre').textContent = md;
          }
        })
        .catch(function (e) {
          showError('Could not load <code>' + p + '</code> (' + e.message + ').');
        });

      function showError(msg) {
        document.getElementById('doc').innerHTML =
          '<div class="err"><h3>Can’t render this doc</h3><p>' + msg + '</p>' +
          '<p>The viewer needs the folder to be served over HTTP (browsers block <code>fetch()</code> on <code>file://</code>). ' +
          'Run <code>python -m http.server</code> in the site folder, or open the markdown file directly:</p>' +
          '<p><a href="' + encodeURI(p) + '">Open ' + p + ' as raw text →</a></p></div>';
      }
    })();
  </script>
</body>
</html>
